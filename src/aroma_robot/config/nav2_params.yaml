amcl:
  ros__parameters:
    use_sim_time: false
    laser_model_type: "likelihood_field"
    min_particle_count: 500
    max_particle_count: 2000
    update_min_d: 0.2
    update_min_a: 0.2
    scan_topic: /scan
    laser_likelihood_max_dist: 2.0
    odom_frame_id: odom
    base_frame_id: base_link
    global_frame_id: map
    transform_tolerance: 0.1

map_server:
  ros__parameters:
    yaml_filename: "maps/arena_map.yaml"
    use_sim_time: false

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

bt_navigator:
  ros__parameters:
    use_sim_time: false
    bt_xml_filename: "behavior_trees/navigate_w_replanning_and_recovery.xml"

recoveries_server:
  ros__parameters:
    use_sim_time: false
