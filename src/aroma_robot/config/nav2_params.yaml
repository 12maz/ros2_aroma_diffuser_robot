amcl:
  ros__parameters:
    use_sim_time: false
    laser_model_type: "likelihood_field"
    min_particle_count: 500
    max_particle_count: 2000
    update_min_d: 0.2
    update_min_a: 0.2
    scan_topic: /scan
    laser_likelihood_max_dist: 2.0
    odom_frame_id: odom
    base_frame_id: base_link
    global_frame_id: map
    transform_tolerance: 0.1
    use_map_topic: false
    scan_configuration:
      min_angle: -1.5708
      max_angle: 1.5708
      angle_increment: 0.0058
      min_range: 0.1
      max_range: 30.0
      max_beams: 60

map_server:
  ros__parameters:
    yaml_filename: ""
    use_sim_time: false
    publish_period: 1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      tolerance: 0.25
      use_final_approach_orientation: true

bt_navigator:
  ros__parameters:
    use_sim_time: false
    bt_xml_filename: "behavior_trees/navigate_w_replanning_and_recovery.xml"

recoveries_server:
  ros__parameters:
    use_sim_time: false

global_costmap:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    update_frequency: 1.0
    publish_frequency: 1.0
    footprint: [[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: true
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      observation_sources: "scan"
      scan:
        topic: /scan
        expected_update_rate: 20.0
        observation_persistence: 0.0
        data_type: "LaserScan"
        min_height: 0.0
        max_height: 2.0
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.55

local_costmap:
  ros__parameters:
    global_frame: odom
    robot_base_frame: base_link
    update_frequency: 5.0
    publish_frequency: 2.0
    footprint: [[0.25, 0.25], [0.25, -0.25], [-0.25, -0.25], [-0.25, 0.25]]
    plugins: ["obstacle_layer", "inflation_layer"]
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      observation_sources: "scan"
      scan:
        topic: /scan
        expected_update_rate: 20.0
        observation_persistence: 0.0
        data_type: "LaserScan"
        min_height: 0.0
        max_height: 2.0
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.55
