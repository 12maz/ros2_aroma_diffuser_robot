slam_toolbox:
  ros__parameters:
    use_sim_time: false
    mode: mapping
    map_file_name: ''
    resolution: 0.05
    scan_topic: /scan
    transform_publish_period: 0.05
    laser_min_range: 0.1
    laser_max_range: 30.0
    map_start_pose:
      x: 0.0
      y: 0.0
      yaw: 0.0
    scan_batch_size: 1
    scan_queue_size: 1
    map_update_interval: 1.0
    output_frame: map
    odom_frame: odom
